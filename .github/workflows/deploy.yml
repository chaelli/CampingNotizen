name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      - name: Wohnwagen-Erkennung (Luftbild + OpenCV)
        # Best effort: bricht den Deploy nicht ab, wenn die Erkennung scheitert.
        continue-on-error: true
        run: |
          python -m pip install --quiet opencv-python-headless numpy requests
          python scripts/detect_caravans.py
      - name: Build
        env:
          # Basis-Pfad = Repo-Name, damit Assets auf GitHub Pages gefunden werden.
          VITE_BASE: /${{ github.event.repository.name }}/
          # Für den geteilten Modus als Repository-Secrets/Variables hinterlegen:
          #   Settings -> Secrets and variables -> Actions
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
